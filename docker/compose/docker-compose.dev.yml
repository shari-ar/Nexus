services:
  open-webui:
    restart: unless-stopped
    environment:
      WEBUI_NAME: ${OPEN_WEBUI_NAME:-Nexus Dev}
      WEBUI_AUTH: ${OPEN_WEBUI_AUTH:-False}
      ENABLE_SIGNUP: ${OPEN_WEBUI_ENABLE_SIGNUP:-True}
      DEFAULT_USER_ROLE: ${OPEN_WEBUI_DEFAULT_USER_ROLE:-admin}
      GLOBAL_LOG_LEVEL: ${NEXUS_LOG_LEVEL:-DEBUG}
      ENABLE_PERSISTENT_CONFIG: ${OPEN_WEBUI_ENABLE_PERSISTENT_CONFIG:-False}
      OFFLINE_MODE: ${OPEN_WEBUI_OFFLINE_MODE:-True}
      HF_HUB_OFFLINE: ${OPEN_WEBUI_HF_HUB_OFFLINE:-1}
      ENABLE_VERSION_UPDATE_CHECK: ${OPEN_WEBUI_ENABLE_VERSION_UPDATE_CHECK:-False}
    volumes:
      - nexus-open-webui-state:/app/backend/data
      - ../../logs/open-webui:/var/log/open-webui

  crewai:
    restart: unless-stopped
    environment:
      NEXUS_LOG_LEVEL: ${NEXUS_LOG_LEVEL:-debug}
    volumes:
      - ../../configs:/app/configs:ro
      - ../../prompts:/app/prompts:ro
      - ../../orchestration:/app/orchestration:ro
      - ../../logs:/var/log/nexus
      - ../../data/workspaces:/workspaces
      - ../../docs:/docs:ro

  openhands:
    restart: unless-stopped
    environment:
      NEXUS_LOG_LEVEL: ${NEXUS_LOG_LEVEL:-debug}
    volumes:
      - ../../docker/stubs:/app:ro
      - ../../docs:/docs:ro

  vllm:
    restart: unless-stopped
    environment:
      NEXUS_LOG_LEVEL: ${NEXUS_LOG_LEVEL:-debug}
      VLLM_LOGGING_LEVEL: ${VLLM_LOGGING_LEVEL:-DEBUG}
    volumes:
      - ../../configs/models:/configs/models:ro
      - ../../logs/models:/logs/models
