name: ${COMPOSE_PROJECT_NAME:-nexus}

x-nexus-stub-build: &nexus-stub-build
  context: ../stubs
  dockerfile: Dockerfile

x-nexus-common-env: &nexus-common-env
  NEXUS_ENV: ${NEXUS_ENV:-development}
  NEXUS_LOG_LEVEL: ${NEXUS_LOG_LEVEL:-info}
  NEXUS_SERVICE_VERSION: v0.1
  NEXUS_LOG_DIR: /var/log/nexus/system

x-nexus-common: &nexus-common
  restart: unless-stopped
  networks:
    - nexus-control-plane
  volumes:
    - ../../logs:/var/log/nexus
    - ../../data:/var/lib/nexus/data
    - ../../memory:/var/lib/nexus/memory
  healthcheck:
    test:
      - CMD
      - python
      - -c
      - "import os, urllib.request; port = os.environ.get('NEXUS_SERVICE_PORT', '8080'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health', timeout=2).read()"
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 10s

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPEN_WEBUI_IMAGE_TAG:-main}
    restart: unless-stopped
    networks:
      - nexus-control-plane
    environment:
      WEBUI_NAME: ${OPEN_WEBUI_NAME:-Nexus}
      WEBUI_AUTH: ${OPEN_WEBUI_AUTH:-False}
      ENABLE_SIGNUP: ${OPEN_WEBUI_ENABLE_SIGNUP:-True}
      DEFAULT_USER_ROLE: ${OPEN_WEBUI_DEFAULT_USER_ROLE:-admin}
      ENABLE_OPENAI_API: ${OPEN_WEBUI_ENABLE_OPENAI_API:-True}
      OPENAI_API_BASE_URLS: ${OPEN_WEBUI_OPENAI_API_BASE_URLS:-http://open-webui-adapter:8080/v1}
      OPENAI_API_KEYS: ${OPEN_WEBUI_OPENAI_API_KEYS:-nexus-dev-key}
      ENABLE_OLLAMA_API: ${OPEN_WEBUI_ENABLE_OLLAMA_API:-False}
      ENV: ${NEXUS_ENV:-dev}
      ENABLE_PERSISTENT_CONFIG: ${OPEN_WEBUI_ENABLE_PERSISTENT_CONFIG:-False}
      OFFLINE_MODE: ${OPEN_WEBUI_OFFLINE_MODE:-True}
      HF_HUB_OFFLINE: ${OPEN_WEBUI_HF_HUB_OFFLINE:-1}
      ENABLE_VERSION_UPDATE_CHECK: ${OPEN_WEBUI_ENABLE_VERSION_UPDATE_CHECK:-False}
    ports:
      - "${OPEN_WEBUI_PORT:-8080}:8080"
    volumes:
      - nexus-open-webui-state:/app/backend/data
      - ../../logs/open-webui:/var/log/open-webui
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    profiles:
      - core
      - ui

  crewai:
    <<: *nexus-common
    build:
      context: ../..
      dockerfile: docker/crewai/Dockerfile
    environment:
      <<: *nexus-common-env
      NEXUS_SERVICE_NAME: crewai
      NEXUS_SERVICE_ROLE: Orchestration runtime
      NEXUS_SERVICE_VERSION: v0.4
      NEXUS_SERVICE_PORT: 8080
      NEXUS_CONFIG_DIR: /app/configs
      NEXUS_PROMPT_DIR: /app/prompts
      NEXUS_WORKFLOW_LOG_DIR: /var/log/nexus/workflows
      NEXUS_AGENT_LOG_DIR: /var/log/nexus/agents
      NEXUS_WORKSPACE_DIR: /workspaces
    ports:
      - "${CREWAI_PORT:-8081}:8080"
    volumes:
      - ../../configs:/app/configs:ro
      - ../../prompts:/app/prompts:ro
      - ../../orchestration:/app/orchestration:ro
      - ../../logs:/var/log/nexus
      - ../../data/workspaces:/workspaces
    profiles:
      - core
      - orchestration

  open-webui-adapter:
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: docker/open-webui-adapter/Dockerfile
    networks:
      - nexus-control-plane
    environment:
      <<: *nexus-common-env
      NEXUS_SERVICE_NAME: open-webui-adapter
      NEXUS_SERVICE_ROLE: Open WebUI to CrewAI adapter
      NEXUS_SERVICE_VERSION: v0.5
      NEXUS_SERVICE_PORT: 8080
      NEXUS_SYSTEM_LOG_DIR: /var/log/nexus/system
      CREWAI_INTERNAL_URL: ${CREWAI_INTERNAL_URL:-http://crewai:8080}
      CREWAI_TIMEOUT_SECONDS: ${CREWAI_TIMEOUT_SECONDS:-30}
      OPEN_WEBUI_ADAPTER_MODEL_ID: ${OPEN_WEBUI_ADAPTER_MODEL_ID:-nexus-crewai}
    ports:
      - "${OPEN_WEBUI_ADAPTER_PORT:-8084}:8080"
    volumes:
      - ../../logs:/var/log/nexus
    depends_on:
      crewai:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()"
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s
    profiles:
      - core
      - orchestration
      - ui

  openhands:
    <<: *nexus-common
    build: *nexus-stub-build
    environment:
      <<: *nexus-common-env
      NEXUS_SERVICE_NAME: openhands
      NEXUS_SERVICE_ROLE: Engineering subsystem placeholder
      NEXUS_SERVICE_PORT: 8080
    ports:
      - "${OPENHANDS_PORT:-8082}:8080"
    volumes:
      - ../../logs:/var/log/nexus
      - ../../data:/var/lib/nexus/data
      - ../../memory:/var/lib/nexus/memory
      - ../../data/workspaces:/workspaces
      - ../../data/projects:/projects
    profiles:
      - core
      - engineering

  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai-cpu}:${VLLM_IMAGE_TAG:-latest-x86_64}
    restart: unless-stopped
    networks:
      - nexus-control-plane
    shm_size: ${VLLM_SHM_SIZE:-4g}
    cap_add:
      - SYS_NICE
    security_opt:
      - seccomp=unconfined
    environment:
      <<: *nexus-common-env
      NEXUS_SERVICE_NAME: vllm
      NEXUS_SERVICE_ROLE: Local language model serving
      NEXUS_SERVICE_VERSION: v0.3
      NEXUS_SERVICE_PORT: ${VLLM_CONTAINER_PORT:-8000}
      HF_HOME: /models/.cache/huggingface
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      VLLM_LOGGING_LEVEL: ${VLLM_LOGGING_LEVEL:-INFO}
      VLLM_NO_USAGE_STATS: ${VLLM_NO_USAGE_STATS:-1}
      VLLM_CPU_KVCACHE_SPACE: ${VLLM_CPU_KVCACHE_SPACE:-4}
    command:
      - --host
      - 0.0.0.0
      - --port
      - "${VLLM_CONTAINER_PORT:-8000}"
      - --model
      - "${VLLM_MODEL_PATH:-Qwen/Qwen2.5-0.5B-Instruct}"
      - --served-model-name
      - "${VLLM_MODEL_NAME:-nexus-local}"
      - --tensor-parallel-size
      - "${VLLM_TENSOR_PARALLEL_SIZE:-1}"
      - --max-model-len
      - "${VLLM_MAX_MODEL_LEN:-2048}"
      - --dtype
      - "${VLLM_DTYPE:-auto}"
      - --trust-remote-code
    ports:
      - "${VLLM_PORT:-8083}:${VLLM_CONTAINER_PORT:-8000}"
    volumes:
      - ../../logs:/var/log/nexus
      - nexus-model-cache:/models
      - ../../logs/models:/logs/models
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import os, urllib.request; port = os.environ.get('NEXUS_SERVICE_PORT', '8000'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health', timeout=2).read()"
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    profiles:
      - core
      - models

networks:
  nexus-control-plane:
    driver: bridge

volumes:
  nexus-model-cache:
  nexus-open-webui-state:
  nexus-crewai-state:
  nexus-openhands-state:
  nexus-vllm-state:
