title: Nexus Documentation
description: Technical documentation for the Nexus local-first multi-agent AI platform.
baseurl: "/Nexus"
url: "https://shari-ar.github.io"
repository: shari-ar/Nexus
markdown: kramdown
highlighter: rouge
permalink: pretty
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
collections: []
defaults:
  - scope:
      path: ""
    values:
      layout: docs
  - scope:
      path: "index.md"
    values:
      layout: default
